version: 2

sources:
  - name: sigma_analytics
    database: SIGMA_DE
    schema: PUBLIC
    tables:
      - name: fact_transactions
      - name: dim_merchant
      - name: dim_customer

models:
  - name: stg_transactions
    description: "Cleaned staging model for fact_transactions"
    columns:
      - name: transaction_id
        description: "Unique identifier for each transaction"
        tests:
          - not_null
          - unique
      - name: amount
        description: "Transaction amount in USD"
        tests:
          - not_null
      - name: status
        description: "Transaction status"
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'failed', 'pending']
      - name: merchant_id
        description: "Merchant identifier"
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
      - name: transaction_date
        description: "Date of transaction"
        tests:
          - not_null
      - name: payment_method
        description: "Payment method used"
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'debit_card', 'upi']
      - name: loaded_at
        description: "When this row was loaded"
        tests:
          - not_null
