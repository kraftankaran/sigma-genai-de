version: 2

models:
  - name: mart_merchant_performance
    description: "Aggregated merchant KPIs"
    columns:
      - name: merchant_id
        description: "Unique identifier for the merchant"
        tests:
          - not_null
          - unique
      - name: merchant_name
        description: "Name of the merchant"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue from completed transactions"
        tests:
          - not_null
      - name: total_transactions
        description: "Total number of transactions"
        tests:
          - not_null
      - name: failed_count
        description: "Number of failed transactions"
        tests:
          - not_null
      - name: failure_rate_pct
        description: "Failure rate as a percentage"
        tests:
          - not_null
      - name: avg_transaction_value
        description: "Average value of completed transactions"
      - name: unique_customers
        description: "Number of unique customers"
        tests:
          - not_null
